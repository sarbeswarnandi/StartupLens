<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StartupLens</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <h1>🚀 StartupLens</h1>
        <p class="subtitle">
            AI-Powered Startup Evaluation Platform
        </p>

        <form id="startupForm">

            <div class="form-group">
                <label for="name">
                    Startup Name
                </label>

                <input
                    type="text"
                    id="name"
                    placeholder="Enter startup name"
                    required>
            </div>

            <div class="form-group">
                <label for="sector">
                    Sector
                </label>

                <input
                    type="text"
                    id="sector"
                    placeholder="Fintech, SaaS, AI, HealthTech..."
                    required>
            </div>

            <div class="form-group">
                <label for="founding_year">
                    Founding Year
                </label>

                <input
                    type="number"
                    id="founding_year"
                    min="2000"
                    max="2030"
                    placeholder="2024"
                    required>
            </div>

            <div class="form-group">
                <label for="team_size">
                    Team Size
                </label>

                <input
                    type="number"
                    id="team_size"
                    min="1"
                    placeholder="5"
                    required>
            </div>

            <div class="form-group">
                <label for="revenue_stage">
                    Revenue Stage
                </label>

                <select
                    id="revenue_stage"
                    required>

                    <option value="">
                        Select Revenue Stage
                    </option>

                    <option value="pre-revenue">
                        Pre-Revenue
                    </option>

                    <option value="early-revenue">
                        Early Revenue
                    </option>

                    <option value="growth">
                        Growth Stage
                    </option>

                    <option value="profitable">
                        Profitable
                    </option>

                </select>
            </div>

            <div class="form-group">
                <label for="geography">
                    Geography
                </label>

                <input
                    type="text"
                    id="geography"
                    placeholder="India, USA, Europe..."
                    required>
            </div>

            <div class="form-group">
                <label for="description">
                    Startup Description
                </label>

                <textarea
                    id="description"
                    rows="6"
                    placeholder="Describe your startup, product, target customers, business model, market opportunity, and traction..."
                    required></textarea>
            </div>

            <button
                type="submit"
                id="analyzeBtn">

                Analyze Startup
            </button>

        </form>

    </div>

    <script src="js/app.js"></script>

</body>

</html>
